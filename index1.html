<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>

    <style>

        body{
            font-family: Arial;
            background-color: lightgray;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        /* Calculator Box */
        .calculator{

            background-color: white;

            padding: 20px;
            border-radius: 50px;

            width: 300px;

            box-shadow: 10px 10px 10px gray;
        }

        /* Display Screen */
        .display{

            width: 100%;
            height: 60px;

            font-size: 28px;
            text-align: right;

            margin-bottom: 15px;

            padding-right: 10px;

            border: 2px solid black;
        }

        /* Buttons Grid */
        .buttons{

            display: grid;

            grid-template-columns: repeat(4, 1fr);

            gap: 10px;
        }

        /* Button Style */
        button{

            height: 60px;

            font-size: 22px;
            font-weight: bold;

            border: none;

            background-color: skyblue;

            cursor: pointer;

            border-radius: 5px;
        }

        button:hover{
            background-color: lightgreen;
        }

        /* Equal Button */
        .equal{
            background-color: orange;
        }

        /* Clear Button */
        .clear{
            background-color: red;
            color: white;
        }

    </style>
</head>

<body>

    <!-- Calculator -->
    <div class="calculator">

        <!-- Display -->
        <input type="text" class="display" readonly>

        <!-- Buttons -->
        <div class="buttons">

            <button class="clear">C</button>
            <button>/</button>
            <button>*</button>
            <button>-</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>+</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>=</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>0</button>

        </div>

    </div>

</body>
</html>
